<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER TASKER v2</title>

<style>

:root{
--bg:#050505;
--card:#0f0f0f;
--neon:#00f2ff;
--text:#e8e8e8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:var(--bg);
color:var(--text);
}

header{
text-align:center;
padding:25px;
font-size:28px;
letter-spacing:4px;
color:var(--neon);
text-shadow:0 0 10px var(--neon);
border-bottom:1px solid var(--neon);
}

nav{
display:flex;
justify-content:center;
gap:15px;
padding:12px;
background:black;
}

nav button{
background:none;
border:1px solid var(--neon);
color:var(--neon);
padding:8px 20px;
cursor:pointer;
}

nav button.active,
nav button:hover{
background:var(--neon);
color:black;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
margin-bottom:20px;
border-left:3px solid var(--neon);
box-shadow:0 0 12px rgba(0,242,255,0.2);
}

.page{display:none}
.page.active{display:block}

input{
width:100%;
padding:10px;
background:#111;
border:1px solid #333;
color:white;
margin-top:10px;
}

.action{
margin-top:10px;
padding:10px;
background:none;
border:1px solid var(--neon);
color:var(--neon);
cursor:pointer;
}

.task{
display:flex;
gap:10px;
padding:8px;
border-bottom:1px solid #222;
}

.progress{
height:10px;
background:#111;
margin-top:10px;
}

.bar{
height:100%;
background:var(--neon);
width:0%;
box-shadow:0 0 10px var(--neon);
}

.levelBox{
text-align:center;
font-size:18px;
margin-bottom:15px;
}

.streak{
font-size:22px;
text-align:center;
margin-top:10px;
}

.nofapBtn{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
border:4px solid var(--neon);
color:var(--neon);
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px var(--neon);
}

.badge{
padding:10px;
border:1px solid #333;
margin:5px;
display:inline-block;
opacity:0.3;
}

.badge.on{
opacity:1;
border-color:var(--neon);
color:var(--neon);
box-shadow:0 0 10px var(--neon);
}

</style>
</head>

<body>

<header>CYBER TASKER</header>

<nav>
<button onclick="page('home')" id="bhome">HOME</button>
<button onclick="page('nofap')" id="bnofap">NOFAP</button>
<button onclick="page('ach')" id="bach">ACHIEVEMENTS</button>
</nav>

<div class="container">

<div id="login" class="page active">
<div class="card">
<h3>INITIALIZE</h3>
<input id="name" placeholder="Enter codename">
<button class="action" onclick="start()">START</button>
</div>
</div>

<div id="home" class="page">

<div class="card">
<div class="levelBox">
LEVEL <span id="level">1</span><br>
XP <span id="xp">0</span>/100
</div>

<div class="progress">
<div class="bar" id="xpbar"></div>
</div>
</div>

<div class="card">
<h3>DAILY TASKS</h3>
<div id="tasks"></div>
</div>

<div class="card">
<h3>TASK POOL</h3>
<input id="taskInput" placeholder="Add task">
<button class="action" onclick="addTask()">ADD</button>
</div>

</div>

<div id="nofap" class="page">
<div class="card" style="text-align:center">

<h2>NOFAP STREAK</h2>

<div class="nofapBtn" onclick="resetNF()">
<span id="nfdays">0</span> DAYS
</div>

<p style="margin-top:10px">Tap to reset</p>

</div>
</div>

<div id="ach" class="page">
<div class="card">
<h3>ACHIEVEMENTS</h3>
<div id="achlist"></div>
</div>
</div>

</div>

<script>

let state={
user:null,
xp:0,
pool:[],
daily:[],
last:null,
nofap:null,
join:Date.now()
}

function save(){
localStorage.setItem("cybertask",JSON.stringify(state))
}

function load(){
let d=localStorage.getItem("cybertask")
if(d){
state=JSON.parse(d)
if(state.user) page("home")
}
}

function start(){
let n=document.getElementById("name").value
if(!n)return
state.user=n
state.join=Date.now()
save()
page("home")
}

function page(p){

document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
document.getElementById(p).classList.add("active")

document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"))
document.getElementById("b"+p).classList.add("active")

if(p=="home")genTasks()
if(p=="nofap")nfDisplay()
if(p=="ach")renderAch()

}

function addTask(){

let t=document.getElementById("taskInput")

if(t.value){
state.pool.push(t.value)
t.value=""
save()
genTasks()
}

}

function genTasks(){

let today=new Date().toDateString()

if(state.last!=today && state.pool.length>=5){

let s=[...state.pool].sort(()=>Math.random()-0.5)

state.daily=s.slice(0,5).map(x=>({text:x,done:false}))
state.last=today

}

renderTasks()

}

function renderTasks(){

let box=document.getElementById("tasks")

box.innerHTML=""

state.daily.forEach((t,i)=>{

box.innerHTML+=`
<div class="task">
<input type="checkbox" ${t.done?"checked":""} onchange="toggle(${i})">
<span style="${t.done?'text-decoration:line-through;opacity:.5':''}">
${t.text}
</span>
</div>
`

})

}

function toggle(i){

state.daily[i].done=!state.daily[i].done

if(state.daily[i].done) state.xp+=10

save()

renderTasks()

hud()

}

function hud(){

let level=Math.floor(state.xp/100)+1
let xp=state.xp%100

document.getElementById("level").innerText=level
document.getElementById("xp").innerText=xp

document.getElementById("xpbar").style.width=xp+"%"

}

function nfDisplay(){

if(!state.nofap)return

let d=Math.floor((Date.now()-state.nofap)/86400000)

document.getElementById("nfdays").innerText=d

}

function resetNF(){

if(!confirm("Reset streak?"))return

state.nofap=Date.now()

save()

nfDisplay()

}

const ACH=[
{t:"Initiate",c:()=>state.user},
{t:"Operator",c:()=>state.xp>=100},
{t:"Strategist",c:()=>state.xp>=300},
{t:"Commander",c:()=>state.xp>=600},
{t:"Monk",c:()=>nfDays()>=30}
]

function nfDays(){
if(!state.nofap)return 0
return Math.floor((Date.now()-state.nofap)/86400000)
}

function renderAch(){

let a=document.getElementById("achlist")

a.innerHTML=""

ACH.forEach(x=>{
let on=x.c()

a.innerHTML+=`
<div class="badge ${on?"on":""}">
${x.t}
</div>`
})

}

load()
hud()

</script>

</body>
</html>
