<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-TASKER // v1.0</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Cyber UI Elements */
        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: var(--neon-glow);
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button:hover, nav button.active {
            background: var(--neon-blue);
            color: black;
            box-shadow: var(--neon-glow);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex-grow: 1;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .card {
            background: var(--card-bg);
            padding: 2rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            border-left: 4px solid var(--neon-blue);
        }

        input, button.action-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
        }

        button.action-btn {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .streak-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: transparent;
            border: 4px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: inset var(--neon-glow), var(--neon-glow);
            cursor: pointer;
            transition: 0.3s;
        }

        .streak-btn:active { transform: scale(0.95); }

        .badge {
            display: inline-block;
            padding: 10px;
            margin: 5px;
            border: 1px solid #333;
            opacity: 0.4;
            filter: grayscale(1);
        }

        .badge.unlocked {
            opacity: 1;
            filter: grayscale(0);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: var(--neon-glow);
        }

    </style>
</head>
<body>

<header>Cyber-Tasker</header>

<nav id="main-nav">
    <button onclick="showPage('home')" class="active">HOME</button>
    <button onclick="showPage('nofap')">NO-FAP</button>
    <button onclick="showPage('achievements')">LOGS</button>
</nav>

<div class="container">
    <div id="auth-page" class="page active">
        <div class="card">
            <h2>INITIALIZE PROTOCOL</h2>
            <input type="text" id="username" placeholder="Enter Codename...">
            <button class="action-btn" onclick="register()">START SYSTEM</button>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="card">
            <h3>DAILY DIRECTIVES</h3>
            <div id="daily-tasks-list"></div>
        </div>
        <div class="card">
            <h3>TASK POOL</h3>
            <input type="text" id="new-task" placeholder="Add a new potential task...">
            <button class="action-btn" onclick="addToPool()">ADD TO POOL</button>
        </div>
    </div>

    <div id="nofap-page" class="page">
        <div class="card" style="text-align: center;">
            <h2>STREAK TIMER</h2>
            <button class="streak-btn" onclick="startNoFap()">
                <span id="streak-count">0</span> DAYS
            </button>
            <p style="margin-top: 1rem;">Tap to reset or start your journey.</p>
        </div>
    </div>

    <div id="achievements-page" class="page">
        <div class="card">
            <h3>SYSTEM ACHIEVEMENTS</h3>
            <div id="achievement-grid"></div>
        </div>
    </div>
</div>

<script>
    // --- APP STATE ---
    let state = {
        user: null,
        taskPool: [],
        dailyTasks: [],
        lastTaskRefresh: null,
        noFapStart: null,
        joinedDate: new Date().getTime(),
        taskStreaks: 0
    };

    // --- CORE LOGIC ---
    function init() {
        const saved = localStorage.getItem('cyberTaskerData');
        if (saved) {
            state = JSON.parse(saved);
            if (state.user) {
                showPage('home');
                refreshDailyTasks();
            }
        }
        renderAchievements();
    }

    function register() {
        const name = document.getElementById('username').value;
        if (!name) return alert("Identify yourself!");
        state.user = name;
        state.joinedDate = new Date().getTime();
        save();
        showPage('home');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(pageId + '-page').classList.add('active');
        const btns = document.querySelectorAll('nav button');
        if(pageId === 'home') btns[0].classList.add('active');
        if(pageId === 'nofap') btns[1].classList.add('active');
        if(pageId === 'achievements') {
            btns[2].classList.add('active');
            renderAchievements();
        }
        
        if(pageId === 'nofap') updateNoFapDisplay();
    }

    // --- TASK SYSTEM ---
    function addToPool() {
        const input = document.getElementById('new-task');
        if (input.value) {
            state.taskPool.push(input.value);
            input.value = '';
            save();
            refreshDailyTasks();
        }
    }

    function refreshDailyTasks() {
        const now = new Date();
        const todayStr = now.toDateString();

        if (state.lastTaskRefresh !== todayStr && state.taskPool.length >= 5) {
            // Shuffle and pick 5
            const shuffled = [...state.taskPool].sort(() => 0.5 - Math.random());
            state.dailyTasks = shuffled.slice(0, 5).map(t => ({ text: t, done: false }));
            state.lastTaskRefresh = todayStr;
            save();
        }
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('daily-tasks-list');
        list.innerHTML = state.dailyTasks.length ? '' : '<p>Add at least 5 tasks to the pool to generate daily goals.</p>';
        state.dailyTasks.forEach((task, index) => {
            list.innerHTML += `
                <div class="task-item">
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span style="${task.done ? 'text-decoration: line-through; opacity: 0.5' : ''}">${task.text}</span>
                </div>
            `;
        });
    }

    function toggleTask(index) {
        state.dailyTasks[index].done = !state.dailyTasks[index].done;
        save();
        renderTasks();
    }

    // --- NO FAP SYSTEM ---
    function startNoFap() {
        if(state.noFapStart && !confirm("This will reset your streak. Are you sure?")) return;
        state.noFapStart = new Date().getTime();
        save();
        updateNoFapDisplay();
    }

    function updateNoFapDisplay() {
        if (!state.noFapStart) return;
        const diff = new Date().getTime() - state.noFapStart;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('streak-count').innerText = days;
    }

    // --- ACHIEVEMENTS ---
    const ACHIEVEMENT_LIST = [
        { id: 'age1', title: 'Novice', req: 'Account 1 day old', check: () => (new Date().getTime() - state.joinedDate) > 86400000 },
        { id: 'nf1', title: 'Initiate', req: '1 Day NoFap', check: () => getNoFapDays() >= 1 },
        { id: 'nf20', title: 'Warrior', req: '20 Days NoFap', check: () => getNoFapDays() >= 20 },
        { id: 'nf90', title: 'Overlord', req: '90 Days NoFap', check: () => getNoFapDays() >= 90 },
        { id: 'nf500', title: 'Immortal', req: '500 Days NoFap', check: () => getNoFapDays() >= 500 }
    ];

    function getNoFapDays() {
        if (!state.noFapStart) return 0;
        return Math.floor((new Date().getTime() - state.noFapStart) / (1000 * 60 * 60 * 24));
    }

    function renderAchievements() {
        const grid = document.getElementById('achievement-grid');
        grid.innerHTML = '';
        ACHIEVEMENT_LIST.forEach(ach => {
            const isUnlocked = ach.check();
            grid.innerHTML += `
                <div class="badge ${isUnlocked ? 'unlocked' : ''}">
                    <strong>${ach.title}</strong><br>
                    <small>${ach.req}</small>
                </div>
            `;
        });
    }

    function save() {
        localStorage.setItem('cyberTaskerData', JSON.stringify(state));
    }

    init();
</script>
</body>
</html>
